name: Release

# Publishes the @mythicalos/* packages to npm WITH provenance attestation, via
# OIDC Trusted Publishing — no stored NPM_TOKEN. Configure the trusted publisher
# for each package on npmjs.com (Settings -> package -> Trusted Publisher):
#   repository = mythicalOS/mythical-ui, workflow = release.yml
#
# Why npm and not `bun publish`: provenance is an npm feature; bun cannot emit it.
# npm cannot resolve the `workspace:` protocol, so scripts/resolve-workspace-deps.ts
# rewrites those to concrete versions first (what `bun publish` did automatically).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write            # required for OIDC trusted publishing + provenance

env:
  BUN_VERSION: "1.3.14"

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mythical-ui
    steps:
      - name: Checkout mythical-ui
        uses: actions/checkout@v4
        with:
          path: mythical-ui

      # bun test (below) includes packages/ui-core/test/css.test.ts +
      # packages/shell/css.test.tsx, which read the canonical tokens.css from a
      # SIBLING mythical-design checkout — same reason/layout as ci.yml.
      - name: Checkout mythical-design (sibling — canonical tokens.css)
        uses: actions/checkout@v4
        with:
          repository: mythicalOS/mythical-design
          path: mythical-design

      - name: Set up bun (install, build, test)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Node + npm (publish)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing / provenance needs npm >= 11.5.1; ubuntu-latest ships 10.x.
      - name: Upgrade npm to a trusted-publishing-capable version
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build FIRST: cross-package imports like `@mythicalos/ui-core/logic`
      # resolve to built dist/, so typecheck of the dependent packages needs the
      # dependency's dist present. `bun run --filter '*' build` builds in
      # dependency order (ui-core before preact-ui/react-ui before shell).
      - name: Build (all packages, dependency order)
        run: bun run build

      - name: Typecheck (all packages)
        run: bun run typecheck

      - name: Unit tests (302)
        run: bun test

      # npm cannot resolve `workspace:` — rewrite to concrete versions first.
      - name: Resolve workspace deps to concrete versions
        run: bun run scripts/resolve-workspace-deps.ts

      # Publish order matters for CONSUMER installability: @mythicalos/ui-core must
      # be live before preact-ui / react-ui (which depend on it), which must be live
      # before shell (which depends on preact-ui). Each publish carries provenance
      # (--provenance) under OIDC trusted publishing — no token is read anywhere.
      # Idempotent: skip a package whose exact version is already on the registry, so
      # a re-tag / re-run does not fail siblings.
      - name: Publish packages with provenance (dependency order)
        run: |
          set -euo pipefail
          publish_if_new() {
            local dir="$1" name version
            name=$(node -p "require('./${dir}/package.json').name")
            version=$(node -p "require('./${dir}/package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "already published: ${name}@${version} — skipping"
              return 0
            fi
            echo "publishing ${name}@${version} from ${dir} (with provenance)"
            (cd "${dir}" && npm publish --provenance --access public)
          }
          publish_if_new packages/ui-core
          publish_if_new packages/preact-ui
          publish_if_new packages/react-ui
          publish_if_new packages/shell
