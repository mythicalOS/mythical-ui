name: Bug report
description: Something behaves differently than documented or expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        **Do not use this form for security vulnerabilities.** Report those through
        [private vulnerability reporting](https://github.com/mythicalOS/mythical-ui/security/advisories/new).

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you file
      options:
        - label: I searched existing open and closed issues and did not find this.
          required: true
        - label: This is not a security vulnerability.
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you observed. Paste exact output rather than describing it.
      placeholder: |
        Running `…` produced:

        ```
        …
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal and exact. A report we cannot reproduce cannot be fixed.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, image tag, or commit SHA.
      placeholder: "@mythicalos/ui-core 0.1.0 — or a commit SHA"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and version, plus runtime version if relevant.
      placeholder: "macOS 15.6 (arm64), Bun 1.3.14"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, screenshots, a link to a reproduction repository, or what you already ruled out.
    validations:
      required: false
